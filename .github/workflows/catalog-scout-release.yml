name: Release Catalog Scout

on:
  push:
    tags:
      - "catalog-scout-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: PyPI and GitHub Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/storewright-catalog-scout
    defaults:
      run:
        working-directory: tools/product-research/catalog-scout
    steps:
      - uses: actions/checkout@v5
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"
          working-directory: tools/product-research/catalog-scout
      - name: Verify tag matches package version
        run: |
          package_version="$(uv run --no-project python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          test "${GITHUB_REF_NAME}" = "catalog-scout-v${package_version}"
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Type check
        run: uv run --frozen pyright
      - name: Test
        run: uv run --frozen pytest -q
      - name: Build distributions
        run: uv build --no-sources
      - name: Smoke test wheel
        run: |
          wheel="$(find dist -name '*.whl' -print -quit)"
          uv run --no-project --with "${wheel}" storewright-scout --help
          workspace="$(mktemp -d)"
          cd "${workspace}"
          uv run --no-project --with "${GITHUB_WORKSPACE}/tools/product-research/catalog-scout/${wheel}" storewright-scout init
          test -f .env
          test -f runtime/storewright_catalog_scout.db
      - name: Publish to PyPI
        run: uv publish
      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes --title "StoreWright Catalog Scout ${GITHUB_REF_NAME#catalog-scout-v}"
        env:
          GH_TOKEN: ${{ github.token }}
